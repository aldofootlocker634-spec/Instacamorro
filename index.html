<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Pro - بوت إنستغرام</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* =======================
           Variables
           ======================= */
        :root {
            --primary: #E1306C;
            --secondary: #833AB4;
            --accent: #FCB045;
            --dark: #0F0F0F;
            --light: #FFFFFF;
            --gray: #8E8E93;
            --bg: #000000;
            --card-bg: #1C1C1E;
            --input-bg: #2C2C2E;
            --success: #30D158;
            --error: #FF453A;
            --radius: 20px;
        }

        /* =======================
           Base
           ======================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--light);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* =======================
           Header
           ======================= */
        .header {
            background: linear-gradient(180deg, rgba(131,58,180,0.3) 0%, transparent 100%);
            padding: 60px 20px 30px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .header .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--secondary), var(--primary), var(--accent));
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 35px;
            box-shadow: 0 10px 40px rgba(225,48,108,0.4);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--gray);
            font-size: 15px;
            margin-top: 5px;
        }

        /* =======================
           Container
           ======================= */
        .container {
            max-width: 420px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        /* =======================
           Cards (iOS Style)
           ======================= */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 0 0 0.5px rgba(255,255,255,0.1);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title i {
            color: var(--primary);
        }

        /* =======================
           Inputs
           ======================= */
        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 18px;
        }

        .input-field {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: var(--input-bg);
            border: none;
            border-radius: 14px;
            color: var(--light);
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            background: #3A3A3C;
            box-shadow: 0 0 0 3px rgba(225,48,108,0.3);
        }

        .input-field::placeholder {
            color: var(--gray);
        }

        /* =======================
           Buttons
           ======================= */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
            box-shadow: 0 8px 30px rgba(225,48,108,0.4);
        }

        .btn-success {
            background: var(--success);
            color: black;
        }

        .btn-danger {
            background: var(--input-bg);
            color: var(--error);
        }

        .btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 12px 40px rgba(225,48,108,0.5);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--input-bg);
            color: var(--light);
        }

        /* =======================
           Status Bar
           ======================= */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            background: var(--input-bg);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--error);
        }

        .status-dot.active {
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        .status-text {
            font-size: 15px;
            font-weight: 500;
            color: var(--gray);
        }

        /* =======================
           Profile Card
           ======================= */
        .profile-card {
            display: none;
        }

        .profile-card.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .profile-pic {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .profile-username {
            font-size: 15px;
            color: var(--gray);
        }

        .profile-bio {
            font-size: 15px;
            line-height: 1.5;
            color: rgba(255,255,255,0.8);
            margin: 15px 0;
            padding: 15px;
            background: var(--input-bg);
            border-radius: 12px;
        }

        /* =======================
           Stats
           ======================= */
        .stats {
            display: flex;
            background: var(--input-bg);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .stat {
            flex: 1;
            text-align: center;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .stat:last-child { border-right: none; }

        .stat-num {
            font-size: 20px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 12px;
            color: var(--gray);
            margin-top: 2px;
        }

        /* =======================
           Posts Grid
           ======================= */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            margin-top: 20px;
        }

        .post-item {
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            background: var(--input-bg);
            cursor: pointer;
        }

        .post-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .post-item:hover img {
            transform: scale(1.1);
        }

        .post-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .post-item:hover .post-overlay {
            opacity: 1;
        }

        .post-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
        }

        /* =======================
           Logs
           ======================= */
        .logs {
            background: var(--input-bg);
            border-radius: 14px;
            padding: 16px;
            max-height: 200px;
            overflow-y: auto;
        }

        .log-item {
            font-size: 13px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: var(--gray);
        }

        .log-item:last-child { border-bottom: none; }
        .log-item.success { color: var(--success); }
        .log-item.error { color: var(--error); }
        .log-item.info { color: var(--accent); }

        /* =======================
           Messages
           ======================= */
        .message {
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 15px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .message.show {
            display: flex;
            animation: shake 0.5s ease;
        }

        .message.success {
            background: rgba(48,209,88,0.15);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .message.error {
            background: rgba(255,69,58,0.15);
            color: var(--error);
            border: 1px solid var(--error);
        }

        .message.loading {
            background: rgba(252,176,69,0.15);
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* =======================
           Tabs
           ======================= */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 14px;
            background: var(--input-bg);
            border: none;
            border-radius: 12px;
            color: var(--gray);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
        }

        /* =======================
           Bottom Nav (iOS Style)
           ======================= */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(28,28,30,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 30px;
            border-top: 0.5px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 10px 20px;
            background: none;
            border: none;
            color: var(--gray);
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-item span {
            font-size: 10px;
            font-weight: 500;
        }

        .nav-item.active {
            color: var(--primary);
        }

        /* =======================
           Sections
           ======================= */
        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* =======================
           Spinner
           ======================= */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* =======================
           Hidden
           ======================= */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <i class="fab fa-instagram"></i>
        </div>
        <h1>Instagram Pro</h1>
        <p>بوت إنستغرام الاحترافي</p>
    </div>

    <div class="container">
        <!-- Message -->
        <div id="message" class="message"></div>

        <!-- Login Section -->
        <div id="loginSection" class="section active">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <i class="fas fa-sign-in-alt"></i>
                        تسجيل الدخول
                    </div>
                </div>

                <div class="input-group">
                    <label>اسم المستخدم</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" class="input-field" placeholder="أدخل اسم المستخدم">
                    </div>
                </div>

                <div class="input-group">
                    <label>كلمة المرور</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" class="input-field" placeholder="أدخل كلمة المرور">
                    </div>
                </div>

                <button id="loginBtn" class="btn btn-primary" onclick="login()">
                    <i class="fas fa-sign-in-alt"></i>
                    تسجيل الدخول
                </button>
            </div>
        </div>

        <!-- Profile Section -->
        <div id="profileSection" class="section">
            <!-- Status -->
            <div class="status-bar">
                <div id="statusDot" class="status-dot"></div>
                <span id="statusText" class="status-text">غير مسجل</span>
            </div>

            <!-- Profile Card -->
            <div class="card profile-card" id="profileCard">
                <div class="profile-header">
                    <img id="profilePic" class="profile-pic" src="" alt="Profile">
                    <div class="profile-info">
                        <div id="profileName" class="profile-name"></div>
                        <div id="profileUsername" class="profile-username"></div>
                    </div>
                </div>

                <div id="profileBio" class="profile-bio"></div>

                <div class="stats">
                    <div class="stat">
                        <div id="postsCount" class="stat-num">0</div>
                        <div class="stat-label">منشورات</div>
                    </div>
                    <div class="stat">
                        <div id="followersCount
