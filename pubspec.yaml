name: adhan_italia
description: Offline Adhan App for Italy
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  
  # Local Storage
  shared_preferences: ^2.2.0
  
  # Location
  geolocator: ^10.1.0
  
  # Prayer Times Calculation (Offline)
  pray_times: ^2.1.1
  
  # Hijri Calendar
  hijri: ^3.0.0
  
  # Notifications
  flutter_local_notifications: ^16.1.0
  timezone: ^0.9.2
  
  # Audio
  audioplayers: ^5.2.1
  
  # UI Components
  intl: ^0.18.1
  google_fonts: ^5.1.0
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/icons/
